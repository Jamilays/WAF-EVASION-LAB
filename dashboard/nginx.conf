# nginx — serves the Vite bundle + proxies /api/* to the FastAPI container.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — any unknown path returns index.html so the client router
    # can take over. (We don't actually use a router yet, but this keeps the
    # contract future-proof.)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Loopback-only liveness.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Reverse-proxy the engine API. `api` is the service name on the waflab
    # network; uvicorn binds to 0.0.0.0:8001 inside the container.
    location /api/ {
        proxy_pass         http://api:8001/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
