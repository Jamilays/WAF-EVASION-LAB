# Paper-subset corpus — 20 SQLi + 20 XSS.
#
# Purpose: give ``wafeval run --corpus paper_subset`` an apples-to-apples
# reproduction set sized to match the 40-payload methodology of
# Yusifova (2024), "Evasion of Web Application Firewalls Through Payload
# Obfuscation: A Black-Box Study". The original paper listed its exact
# payloads in the thesis text; that list isn't bundled here, so this file
# is **paper-style, not paper-verbatim**: the entries are canonical SQLi
# / XSS vectors drawn from the same academic literature (PayloadsAllTheThings,
# OWASP WSTG, SecLists) that the paper itself cited, arranged into the
# same category split (boolean / union / stacked / time / error / auth for
# SQLi; script / handler / DOM / polyglot for XSS). Bypass rates from
# this subset should be within the natural variance of the paper's CRS 3.x
# numbers, not a mechanical replay of its literal input.
#
# Every entry here is a copy of a same-id entry in ``sqli.yaml`` or
# ``xss.yaml``. The duplication is deliberate — the subset is a fixed
# point for the replication-run phase script, and unrelated churn in the
# full corpus shouldn't silently drift the reproduction numbers.

- id: sqli-bool-001
  class: sqli
  payload: 1' OR '1'='1
  trigger: &id001
    kind: any_of
    any_of:
    - kind: contains
      needle: First name
    - kind: regex
      pattern: SQLITE_ERROR|syntax error|no such column
  cwe: CWE-89
  source: PayloadsAllTheThings/SQL Injection/Intruder/exploit.txt
- id: sqli-bool-002
  class: sqli
  payload: 1' OR 1=1 -- -
  trigger: *id001
  cwe: CWE-89
  source: OWASP WSTG v4.2 §4.9.4
- id: sqli-bool-003
  class: sqli
  payload: ''' OR ''a''=''a'
  trigger: *id001
  cwe: CWE-89
  source: SecLists/Fuzzing/SQLi/Generic-SQLi.txt
- id: sqli-bool-004
  class: sqli
  payload: 1' OR 1=1#
  trigger: *id001
  cwe: CWE-89
  source: PayloadsAllTheThings — MySQL comments
- id: sqli-bool-005
