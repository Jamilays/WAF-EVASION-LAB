# Server-side template injection — 25 entries. WAF-view only.
# Sources: PayloadsAllTheThings/Server Side Template Injection,
# PortSwigger Web Security Academy, James Kettle's "Server-Side Template
# Injection" research, Tplmap project.
#
# Trigger = status:200. None of DVWA/Juice Shop/WebGoat have a first-class
# SSTI sink — the engine routes SSTI through the existing reflective sinks
# (DVWA xss_r, Juice Shop /rest/products/search, WebGoat SqlInjection lesson)
# so each WAF gets to inspect the template syntax on the wire even if no
# template engine evaluates it. See targets.yaml for the routing.

- id: ssti-jinja-basic
  class: ssti
  payload: "{{7*7}}"
  trigger: &T200 { kind: status, code: 200 }
  cwe: CWE-1336
  source: "PayloadsAllTheThings — Jinja2 probe"

- id: ssti-jinja-config
  class: ssti
  payload: "{{config.items()}}"
  trigger: *T200
  cwe: CWE-1336
  source: "PayloadsAllTheThings — Flask config leak"

- id: ssti-jinja-class
  class: ssti
  payload: "{{''.__class__.__mro__[1].__subclasses__()}}"
  trigger: *T200
  cwe: CWE-1336
  source: "PayloadsAllTheThings — MRO walker"

- id: ssti-jinja-rce
  class: ssti
  payload: "{{ self._TemplateReference__context.cycler.__init__.__globals__.os.popen('id').read() }}"
  trigger: *T200
  cwe: CWE-1336
  source: "PortSwigger — Jinja2 RCE via cycler.__init__"

- id: ssti-jinja-popen
  class: ssti
  payload: "{{request.application.__globals__.__builtins__.__import__('os').popen('id').read()}}"
  trigger: *T200
  cwe: CWE-1336
  source: "Flask request.application RCE chain"

- id: ssti-jinja-attr-bracket
  class: ssti
  payload: "{{request['application']['__globals__']['__builtins__']['eval']('1+1')}}"
  trigger: *T200
  cwe: CWE-1336
  source: "Bracket-syntax bypass for dotted-attr filters"

- id: ssti-twig-basic
  class: ssti
  payload: "{{7*'7'}}"
  trigger: *T200
  cwe: CWE-1336
  source: "PayloadsAllTheThings — Twig probe (vs Jinja)"

- id: ssti-twig-filter
  class: ssti
  payload: "{{'ssti-probe'|upper}}"
  trigger: *T200
  cwe: CWE-1336
  source: "PayloadsAllTheThings — Twig filter chain"

- id: ssti-twig-rce
  class: ssti
  payload: "{{_self.env.registerUndefinedFilterCallback('exec')}}{{_self.env.getFilter('id')}}"
  trigger: *T200
  cwe: CWE-1336
  source: "PayloadsAllTheThings — Twig RCE"

- id: ssti-freemarker-assign
  class: ssti
  payload: "<#assign x=7*7>${x}"
  trigger: *T200
  cwe: CWE-1336
  source: "PayloadsAllTheThings — FreeMarker"

- id: ssti-freemarker-rce
  class: ssti
  payload: "<#assign ex=\"freemarker.template.utility.Execute\"?new()>${ex(\"id\")}"
  trigger: *T200
  cwe: CWE-1336
  source: "PayloadsAllTheThings — FreeMarker Execute"

- id: ssti-velocity-context
  class: ssti
  payload: "#set($x=7*7)$x"
  trigger: *T200
  cwe: CWE-1336
  source: "PayloadsAllTheThings — Velocity"

- id: ssti-velocity-rce
  class: ssti
  payload: "#set($e=\"e\")${e.getClass().forName(\"java.lang.Runtime\").getMethod(\"getRuntime\",null).invoke(null,null).exec(\"id\")}"
  trigger: *T200
  cwe: CWE-1336
  source: "PayloadsAllTheThings — Velocity Runtime.exec"

- id: ssti-erb-simple
  class: ssti
  payload: "<%= 7*7 %>"
  trigger: *T200
  cwe: CWE-1336
  source: "PayloadsAllTheThings — ERB"

- id: ssti-erb-rce
  class: ssti
  payload: "<%= `id` %>"
  trigger: *T200
  cwe: CWE-1336
  source: "ERB backtick RCE"

- id: ssti-smarty-phpinfo
  class: ssti
  payload: "{php}echo 'ssti-probe';{/php}"
  trigger: *T200
  cwe: CWE-1336
  source: "PayloadsAllTheThings — Smarty"

- id: ssti-smarty-version
  class: ssti
  payload: "{$smarty.version}"
  trigger: *T200
  cwe: CWE-1336
  source: "Smarty version probe (non-RCE fingerprint)"

- id: ssti-mako-rce
  class: ssti
  payload: "<% import os; x=os.popen('id').read() %>${x}"
  trigger: *T200
  cwe: CWE-1336
  source: "Mako import block RCE"

- id: ssti-pug-basic
  class: ssti
  payload: "#{7*7}"
  trigger: *T200
  cwe: CWE-1336
  source: "Pug interpolation probe"

- id: ssti-pug-rce
  class: ssti
  payload: "#{global.process.mainModule.require('child_process').execSync('id').toString()}"
  trigger: *T200
  cwe: CWE-1336
  source: "Pug Node.js RCE chain"

- id: ssti-handlebars-rce
  class: ssti
  payload: "{{#with \"s\" as |string|}}{{#with \"e\"}}{{#with split as |conslist|}}{{this.pop}}{{this.push (lookup string.sub \"constructor\")}}{{this.pop}}{{#with string.split as |codelist|}}{{this.pop}}{{this.push \"return require('child_process').execSync('id');\"}}{{this.pop}}{{#each conslist}}{{#with (string.sub.apply 0 codelist)}}{{this}}{{/with}}{{/each}}{{/with}}{{/with}}{{/with}}{{/with}}"
  trigger: *T200
  cwe: CWE-1336
  source: "Mahmoud Aly — Handlebars RCE"

- id: ssti-dollar-brace-elexp
  class: ssti
  payload: "${7*7}"
  trigger: *T200
  cwe: CWE-1336
  source: "PayloadsAllTheThings — EL-style expr"

- id: ssti-tornado-import
  class: ssti
  payload: "{% import os %}{{os.popen('id').read()}}"
  trigger: *T200
  cwe: CWE-1336
  source: "Tornado template import RCE"

- id: ssti-jsp-el
  class: ssti
  payload: "${pageContext.request.getServerInfo()}"
  trigger: *T200
  cwe: CWE-1336
  source: "JSP EL — server info leak"

- id: ssti-spel-class
  class: ssti
  payload: "${T(java.lang.Runtime).getRuntime().exec('id')}"
  trigger: *T200
  cwe: CWE-1336
  source: "Spring SpEL → Runtime.exec (CVE-2022-22965 family)"
