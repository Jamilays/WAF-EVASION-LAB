# open-appsec nginx — one listener per target, multiplexed by Host header.
#
# Traefik routes:
#   openappsec-dvwa.local       → this container :80 → dvwa:80
#   openappsec-webgoat.local    → this container :80 → webgoat:8080
#   openappsec-juiceshop.local  → this container :80 → juiceshop:3000
#
# Every request crosses the open-appsec attachment module which forwards
# the bytes to the ML agent at /tmp/cp_nano_agent_attachment.sock. The
# agent either returns a verdict (attack → 403) or lets nginx continue the
# proxy_pass.

# /healthz must bypass the agent — the compose healthcheck has to work even
# before the agent is trained. Served from an internal server block that
# matches by path across all Hosts.
server {
    listen 80 default_server;
    server_name _;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
        add_header X-Waflab-Waf openappsec;
    }

    # Anything hitting default_server without a matching Host header → 421
    # (Misdirected Request) so Traefik noise doesn't skew results.
    location / {
        return 421 "unknown host\n";
    }
}

server {
    listen 80;
    server_name openappsec-dvwa.local;

    add_header X-Waflab-Waf openappsec always;

    location / {
        proxy_pass http://dvwa:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
}

server {
    listen 80;
    server_name openappsec-webgoat.local;

    add_header X-Waflab-Waf openappsec always;

    location / {
        proxy_pass http://webgoat:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
}

server {
    listen 80;
    server_name openappsec-juiceshop.local;

    add_header X-Waflab-Waf openappsec always;

    location / {
        proxy_pass http://juiceshop:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
}
