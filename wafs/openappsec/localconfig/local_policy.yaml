## open-appsec local policy — waflab Phase 7
##
## Mode: prevent-learn — the agent blocks any request it classifies as an
## attack with confidence >= minimum-confidence. `-learn` tail keeps the
## online learner enabled so bypass data improves over time.
##
## Confidence ladder (open-appsec docs):
##   critical | high | medium | low
##   ^ strict                       ^ permissive (catches more, more FP)
##
## We start at "critical" to avoid flagging benign traffic in the lab; once
## the engine has baseline runs we can drop to "high" and compare.

policies:
  default:
    triggers:
      - appsec-default-log-trigger
    mode: prevent-learn
    practices:
      - webapp-default-practice
    custom-response: appsec-waflab-block-403
  specific-rules: []

practices:
  - name: webapp-default-practice
    openapi-schema-validation:
      configmap: []
      override-mode: inactive
    snort-signatures:
      configmap: []
      override-mode: inactive
    web-attacks:
      max-body-size-kb: 1000000
      max-header-size-bytes: 102400
      max-object-depth: 40
      max-url-size-bytes: 32768
      minimum-confidence: critical
      override-mode: prevent-learn
      protections:
        csrf-protection: inactive
        error-disclosure: inactive
        non-valid-http-methods: false
        open-redirect: inactive
    anti-bot:
      injected-URIs: []
      validated-URIs: []
      override-mode: inactive

log-triggers:
  - name: appsec-default-log-trigger
    access-control-logging:
      allow-events: false
      drop-events: true
    additional-suspicious-events-logging:
      enabled: true
      minimum-severity: high
      response-body: false
    appsec-logging:
      all-web-requests: false
      detect-events: true
      prevent-events: true
    extended-logging:
      http-headers: false
      request-body: false
      url-path: true
      url-query: true
    log-destination:
      cloud: false
      stdout:
        format: json

custom-responses:
  - name: appsec-waflab-block-403
    mode: response-code-only
    http-response-code: 403
